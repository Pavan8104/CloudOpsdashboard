services:

  # === PostgreSQL Database ===
  postgres:
    image: postgres:15-alpine
    container_name: cloudops-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cloudopsdb}
      POSTGRES_USER: ${POSTGRES_USER:-cloudops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudops123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudops} -d ${POSTGRES_DB:-cloudopsdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudops-network

  # === Spring Boot Backend ===
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloudops-backend:local
    container_name: cloudops-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/cloudopsdb}
      DB_DRIVER: org.postgresql.Driver
      DB_USERNAME: ${DB_USERNAME:-cloudops}
      DB_PASSWORD: ${DB_PASSWORD:-cloudops123}
      HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: ${JWT_SECRET:-CloudOpsDevelopmentSecretKeyForLocalDockerComposeDev2024}
      JPA_DDL_AUTO: create-drop
      SHOW_SQL: "false"
      CORS_ORIGINS: http://localhost:80,http://localhost
      GOOGLE_CLOUD_PROJECT: cloudops-local-dev
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cloudops-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # === Angular Frontend ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: cloudops-frontend:local
    container_name: cloudops-frontend
    ports:
      - "80:8080"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    networks:
      - cloudops-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  cloudops-network:
    driver: bridge
# # Health checks ensure containers start in correct order
# # cloudops-network isolates containers from host network
# # postgres_data volume persists DB across container restarts
# # restart: unless-stopped ensures auto-recovery on crash
# # Consider adding deploy.resources.limits for production
# # logging: driver: json-file with max-size for log rotation
# # env_file: .env can be used instead of inline environment
# # build.args can pass build-time variables to Dockerfile
# # pull_policy: always ensures latest image on every start
# # platform: linux/amd64 for M1/M2 Mac compatibility
