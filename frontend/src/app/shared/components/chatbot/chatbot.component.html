<div class="chatbot-wrapper" *ngIf="isChatbotEnabled">

  <!-- Floating Trigger Button -->
  <button class="chatbot-fab" (click)="toggleChat()" [class.active]="isOpen"
          matTooltip="CloudOps Assistant" matTooltipPosition="left">
    <mat-icon *ngIf="!isOpen">smart_toy</mat-icon>
    <mat-icon *ngIf="isOpen">close</mat-icon>
    <span class="fab-label" *ngIf="!isOpen">Assistant</span>
  </button>

  <!-- Chat Window -->
  <div class="chat-window" [class.open]="isOpen">

    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-info">
        <div class="bot-avatar">
          <mat-icon>smart_toy</mat-icon>
        </div>
        <div>
          <div class="chat-title">CloudOps Assistant</div>
          <div class="chat-status">
            <span class="status-dot"></span>
            Online · Powered by CloudOps
          </div>
        </div>
      </div>
      <div class="chat-header-actions">
        <button mat-icon-button (click)="clearChat()" matTooltip="Clear conversation" class="header-btn">
          <mat-icon>restart_alt</mat-icon>
        </button>
        <button mat-icon-button (click)="toggleChat()" class="header-btn">
          <mat-icon>minimize</mat-icon>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages-container" #messagesContainer>
      <div *ngFor="let msg of messages" class="message-row" [class.user-row]="msg.role === 'user'">

        <!-- Assistant Avatar -->
        <div class="avatar" *ngIf="msg.role === 'assistant'">
          <mat-icon>smart_toy</mat-icon>
        </div>

        <!-- Bubble -->
        <div class="bubble" [class.user-bubble]="msg.role === 'user'" [class.bot-bubble]="msg.role === 'assistant'">
          <div class="bubble-content" [innerHTML]="formatMessage(msg.content)"></div>
          <div class="bubble-time">{{ msg.timestamp | date:'HH:mm' }}</div>

          <!-- Suggestion Chips -->
          <div class="suggestions" *ngIf="msg.suggestions && msg.suggestions.length > 0 && msg.role === 'assistant'">
            <button *ngFor="let s of msg.suggestions" class="suggestion-chip" (click)="useSuggestion(s)">
              {{ s }}
            </button>
          </div>
        </div>

      </div>

      <!-- Typing Indicator -->
      <div class="message-row" *ngIf="isLoading">
        <div class="avatar">
          <mat-icon>smart_toy</mat-icon>
        </div>
        <div class="bubble bot-bubble typing-bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
      <div class="input-row">
        <button class="voice-btn" (click)="toggleVoice()" [class.listening]="isListening" [disabled]="isLoading || !hasSpeechSupport" matTooltip="Voice Input" type="button">
          <mat-icon>{{ isListening ? 'mic' : 'mic_none' }}</mat-icon>
        </button>
        <textarea
          [formControl]="inputControl"
          placeholder="Ask me anything about CloudOps..."
          class="chat-input"
          rows="1"
          (keydown)="onKeyDown($event)"
          [disabled]="isLoading">
        </textarea>
        <button class="send-btn" (click)="sendMessage()"
                [disabled]="inputControl.invalid || isLoading">
          <mat-icon>send</mat-icon>
        </button>
      </div>
      <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
    </div>

  </div>
</div>
