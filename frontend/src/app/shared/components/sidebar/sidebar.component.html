<nav class="sidebar" [class.collapsed]="!isOpen && !isMobile" [class.mobile-open]="isMobile && isOpen">

  <div class="nav-section">
    <span class="nav-section-label" *ngIf="isOpen || isMobile">MONITORING</span>

    <ng-container *ngFor="let item of navItems">
      <div class="nav-divider" *ngIf="item.adminOnly && isVisible(item) && isAdmin">
        <span class="nav-section-label" *ngIf="isOpen || isMobile">ADMIN</span>
      </div>

      <a *ngIf="isVisible(item)"
         class="nav-item"
         [class.active]="isActive(item.route)"
         [routerLink]="item.route"
         [matTooltip]="(!isOpen && !isMobile) ? item.label : ''"
         matTooltipPosition="right">

        <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
        <span class="nav-label" *ngIf="isOpen || isMobile">{{ item.label }}</span>
        <div class="active-indicator" *ngIf="isActive(item.route)"></div>
      </a>
    </ng-container>
  </div>

  <div class="sidebar-footer" *ngIf="isOpen || isMobile">
    <mat-icon class="footer-icon">cloud</mat-icon>
    <div class="footer-info">
      <span class="footer-name">CloudOps v1.0</span>
      <span class="footer-env">Production</span>
    </div>
  </div>
</nav>
