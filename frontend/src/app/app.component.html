<div class="app-layout" *ngIf="showLayout">

  <app-navbar (sidebarToggle)="toggleSidebar()"></app-navbar>

  <!-- Mobile overlay to close sidebar -->
  <div class="sidebar-overlay" *ngIf="isMobile && sidebarOpen" (click)="toggleSidebar()"></div>

  <app-sidebar [isOpen]="sidebarOpen" [isMobile]="isMobile"></app-sidebar>

  <main class="main-content" [class.sidebar-open]="sidebarOpen && !isMobile" [class.sidebar-closed]="!sidebarOpen || isMobile">
    <router-outlet></router-outlet>
  </main>

  <app-chatbot></app-chatbot>

</div>

<div class="login-layout" *ngIf="!showLayout">
  <router-outlet></router-outlet>
</div>
