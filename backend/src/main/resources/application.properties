# ================================================================
# CloudOps Dashboard — Application Configuration
# All secrets must be injected via environment variables at runtime.
# ================================================================

# === APPLICATION INFO ===
spring.application.name=cloudops-dashboard
server.port=${PORT:8080}
server.servlet.context-path=/api

# === DATABASE ===
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# === JPA / HIBERNATE ===
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.open-in-view=false

# === JWT ===
# Minimum 64 chars; inject a strong random value in production
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# === SPRING SECURITY ===
spring.security.user.name=actuator-admin
spring.security.user.password=${ACTUATOR_PASSWORD}

# === ACTUATOR ===
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# === HIKARI CONNECTION POOL ===
# Prevent "DNS/Connection found" issues by managing pool lifecycle
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# === LOGGING ===
logging.level.com.cloudops=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# === CORS ===
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:80,http://localhost}

# === GCP ===
spring.cloud.gcp.project-id=${GOOGLE_CLOUD_PROJECT:local-dev}

# === FILE UPLOAD ===
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# CSP nonce support placeholder
# Rate limiting: consider adding spring-boot-starter-aop with bucket4j
# HikariCP pool: spring.datasource.hikari.maximum-pool-size=10
# spring.datasource.hikari.connection-timeout=30000
# spring.datasource.hikari.idle-timeout=600000
# spring.datasource.hikari.max-lifetime=1800000
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css
server.compression.min-response-size=1024
