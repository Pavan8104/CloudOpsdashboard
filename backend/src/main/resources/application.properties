# ================================================================
# CloudOps Dashboard - Application Configuration
# Yeh file poori application ki settings ka control center hai.
# Local dev ke liye H2, GCP pe jaake Cloud SQL switch hoga.
# Secrets yahan hardcode mat karo - environment variables use karo!
# ================================================================

# === APPLICATION INFO ===
spring.application.name=cloudops-dashboard
server.port=${PORT:8080}
# Context path - /api prefix se sab REST endpoints shuru hote hain
server.servlet.context-path=/api

# === DATABASE CONFIGURATION ===
# By default H2 in-memory use karta hai local development ke liye.
# GCP pe deploy karte waqt ye sab environment variables se override ho jayega.
spring.datasource.url=${DB_URL:jdbc:h2:mem:cloudopsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:cloudops}
spring.datasource.password=${DB_PASSWORD:cloudops123}

# H2 Console - sirf development mein useful, production mein band rakho
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# === JPA / HIBERNATE ===
# update mode - dev mein schema auto update karta hai
# Production mein 'validate' ya 'none' use karo - manually migrations chalaao
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
# Lazy loading ke waqt jo N+1 problem aata hai, yeh thoda help karta hai
spring.jpa.open-in-view=false

# === JWT CONFIGURATION ===
# Secret key - production mein GCP Secret Manager se load karo
# Yeh key minimum 256-bit (32 chars) honi chahiye for HS256
jwt.secret=${JWT_SECRET:CloudOpsSecretKeyForJWTTokenGeneration2024VeryLongAndSecure}
# Token 24 ghante valid rahega - ops team ke liye convenient
jwt.expiration=${JWT_EXPIRATION:86400000}
# Refresh token 7 din valid - user ko baar baar login nahi karna padega
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# === SPRING SECURITY ===
# Actuator endpoints ke liye separate credentials
spring.security.user.name=actuator-admin
spring.security.user.password=${ACTUATOR_PASSWORD:actuator-secret-change-me}

# === ACTUATOR (Health Probes for GCP) ===
# GCP Cloud Run aur GKE health checks in endpoints ko ping karte hain
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
# Liveness aur readiness probes GKE ke liye
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# === LOGGING ===
# Structured logging - GCP Cloud Logging ke saath better integration ke liye
logging.level.com.cloudops=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# === CORS - Frontend se baat karne ke liye ===
# Angular dev server 4200 pe chalta hai
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

# === GCP SPECIFIC HOOKS ===
# Jab GCP pe deploy karo toh ye environment variables set karna
# DB_URL=jdbc:postgresql:///<DB_NAME>?cloudSqlInstance=<INSTANCE_CONNECTION>&socketFactory=com.google.cloud.sql.postgres.SocketFactory
# GOOGLE_CLOUD_PROJECT=your-project-id
# K_SERVICE=cloudops-dashboard (Cloud Run service name auto inject karta hai)
spring.cloud.gcp.project-id=${GOOGLE_CLOUD_PROJECT:local-dev}

# === MULTIPART FILE UPLOAD ===
# Incident reports ke saath attachments ke liye
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

