name: CI — Lint & Build on feature/develop branches

# Runs on feature branches and develop to catch issues before they hit main.
# main is excluded — deploy.yml owns that branch.
# Tests are skipped for now: no spec files exist in the project yet.
on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

# One run per branch — cancel the stale one if you push again quickly
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1: Backend — compile & verify
  # ──────────────────────────────────────────────────────────────
  backend-build:
    name: Backend — Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: cloudopsdb_test
          POSTGRES_USER: cloudops
          POSTGRES_PASSWORD: cloudops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (verify it compiles cleanly)
        run: |
          cd backend
          export MAVEN_OPTS="-Xmx1024m"
          mvn clean package -DskipTests -q
        env:
          JWT_SECRET: test-secret-key-for-ci-only

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 3

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Frontend — lint & production build
  # ──────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Production build
        run: |
          cd frontend
          npm run build:prod
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'

      - name: Verify build output exists
        run: |
          ls -la frontend/dist/cloudops-dashboard/browser/index.html

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/cloudops-dashboard/browser/
          retention-days: 3
