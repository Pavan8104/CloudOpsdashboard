name: CI — Test on feature & develop branches

# Runs on feature branches and develop to catch issues before they reach main.
# main is intentionally excluded — deploy.yml already runs tests there
# before building Docker images, so running CI separately on main just
# wastes runners and doubles the queue time.
on:
  push:
    branches:
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

# One run per branch at a time — skip the stale one if you push again quickly
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1: Backend — unit + integration tests
  # ──────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: cloudopsdb_test
          POSTGRES_USER: cloudops
          POSTGRES_PASSWORD: cloudops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        run: |
          cd backend
          export MAVEN_OPTS="-Xmx1024m"
          mvn test -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/cloudopsdb_test \
            -Dspring.datasource.username=cloudops \
            -Dspring.datasource.password=cloudops_test
        env:
          JWT_SECRET: test-secret-key-for-ci-only-not-production

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Test Results
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Build JAR (verify it compiles cleanly)
        run: |
          cd backend
          mvn clean package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 3

  # ──────────────────────────────────────────────────────────────
  # JOB 2: Frontend — lint, tests, production build
  # ──────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Run tests
        run: |
          cd frontend
          npm run test:ci

      - name: Production build
        run: |
          cd frontend
          npm run build:prod
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'

      - name: Verify build output exists
        run: |
          ls -la frontend/dist/cloudops-dashboard/browser/index.html

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/cloudops-dashboard/browser/
          retention-days: 3
