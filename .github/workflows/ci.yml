name: CloudOps Dashboard CI/CD Pipeline

# === TRIGGER CONDITIONS ===
# Main aur develop branches pe push hone pe chalega
# Pull requests pe bhi run hoga - merge se pehle check ke liye
on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

# Ek hi time pe ek job run ho - concurrent builds avoid karo
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # GCP ke liye environment variables - GitHub Secrets se aate hain
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  REGISTRY: gcr.io
  IMAGE_NAME: cloudops-dashboard

jobs:

  # ============================================================
  # JOB 1: Backend Tests aur Build
  # ============================================================
  backend-test:
    name: Backend - Test & Build
    runs-on: ubuntu-latest

    services:
      # Tests ke liye PostgreSQL - real database tests achhe hote hain
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: cloudopsdb_test
          POSTGRES_USER: cloudops
          POSTGRES_PASSWORD: cloudops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Code checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 21 setup - backend ke liye
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven  # Maven dependencies cache karo - faster builds

      # Maven tests chalao
      - name: Run backend tests
        run: |
          cd backend
          mvn test -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/cloudopsdb_test \
            -Dspring.datasource.username=cloudops \
            -Dspring.datasource.password=cloudops_test
        env:
          JWT_SECRET: test-secret-key-for-ci-only-not-production

      # Test results publish karo - GitHub PR pe dikhai denge
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Test Results
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      # Build JAR - tests pass hone ke baad
      - name: Build JAR
        run: |
          cd backend
          mvn clean package -DskipTests -q

      # JAR artifact store karo - deploy job use karega
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 5

  # ============================================================
  # JOB 2: Frontend Build aur Test
  # ============================================================
  frontend-test:
    name: Frontend - Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node.js setup
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Dependencies install karo
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci  # ci use karo - package-lock.json se exact versions install

      # Production build banao
      - name: Build frontend for production
        run: |
          cd frontend
          npm run build:prod
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'  # Large builds ke liye

      # Build artifacts store karo
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/cloudops-dashboard/browser/
          retention-days: 5

  # ============================================================
