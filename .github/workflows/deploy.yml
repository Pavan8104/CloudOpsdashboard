name: Build & Deploy to Railway

on:
  push:
    branches: [main]

# One deployment at a time — cancel any in-flight run if a newer push lands
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Frontend sanity check before we build images ──────────────────────
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci --silent

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test:ci

      # ── Build & push images ───────────────────────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ps8104/cloudops-backend:latest
            ps8104/cloudops-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ps8104/cloudops-frontend:latest
            ps8104/cloudops-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy backend to Railway ─────────────────────────────────────────
      # Step 1: Tell Railway which image to use (SHA-pinned, not :latest)
      # Step 2: Actually trigger the deployment (serviceInstanceDeployV2)
      # Without BOTH calls, Railway either uses the old cached digest
      # or updates the config but never starts a new deployment.
      - name: Update backend image on Railway
        run: |
          curl -f -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceUpdate(serviceId: \"ad0b526f-6f55-4a22-8715-9244a8c0a437\", environmentId: \"039d041d-957e-42e3-a3cb-d940642172e3\", input: { source: { image: \"ps8104/cloudops-backend:${{ github.sha }}\" } }) }"
            }'

      - name: Trigger backend deployment on Railway
        run: |
          curl -f -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceDeployV2(serviceId: \"ad0b526f-6f55-4a22-8715-9244a8c0a437\", environmentId: \"039d041d-957e-42e3-a3cb-d940642172e3\") }"
            }'

      # ── Deploy frontend to Railway ────────────────────────────────────────
      - name: Update frontend image on Railway
        run: |
          curl -f -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceUpdate(serviceId: \"a52a6edb-d385-4032-bb68-c69993307f88\", environmentId: \"039d041d-957e-42e3-a3cb-d940642172e3\", input: { source: { image: \"ps8104/cloudops-frontend:${{ github.sha }}\" } }) }"
            }'

      - name: Trigger frontend deployment on Railway
        run: |
          curl -f -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceDeployV2(serviceId: \"a52a6edb-d385-4032-bb68-c69993307f88\", environmentId: \"039d041d-957e-42e3-a3cb-d940642172e3\") }"
            }'
