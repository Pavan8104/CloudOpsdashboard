databases:
  # === PostgreSQL Database (Render managed) ===
  - name: cloudops-db
    plan: free
    databaseName: cloudopsdb
    user: cloudops

services:
  # === Spring Boot Backend ===
  - type: web
    name: cloudops-backend
    env: docker
    image:
      url: docker.io/ps8104/cloudops-backend:latest
    plan: free
    healthCheckPath: /api/actuator/health
    envVars:
      - key: DB_URL
        fromDatabase:
          name: cloudops-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: cloudops-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cloudops-db
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: JPA_DDL_AUTO
        value: update
      - key: SQL_INIT_MODE
        value: never
      - key: SHOW_SQL
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
      - key: PORT
        value: "8080"

  # === Angular Frontend ===
  - type: web
    name: cloudops-frontend
    env: docker
    image:
      url: docker.io/ps8104/cloudops-frontend:latest
    plan: free
    envVars:
      - key: BACKEND_URL
        fromService:
          name: cloudops-backend
          type: web
          property: hostport
          transform: "http://{value}"
